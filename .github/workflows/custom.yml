name: 自定义编译 U-Boot
permissions:
  contents: write

env:
  ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      model:
        description: '设备型号'
        required: true
        type: string
        default: 'Xiaomi_Mi_Router_4a/3g-v2'
      flash:
        description: '闪存类型'
        required: true
        type: choice
        options:
        - 'NAND'
        - 'NAND-NMBM'
        - 'NOR'
        default: 'NOR'
      mtdparts:
        description: 'MTD 分区布局'
        required: true
        type: string
        default: '192k(u-boot),64k(u-boot-env),64k(factory),64k(factory),64k(crash),64k(cfg_bak),1m(overlay),-(firmware)'
      kernel_offset:
        description: '内核加载基地址'
        required: true
        type: string
        default: '0x180000'
      gpio_config:
        description: 'GPIO 配置（格式：复位引脚,指示灯引脚）'
        required: true
        type: string
        default: '18,8'
      cpufreq:
        description: 'CPU 频率（400 - 1200）'
        required: true
        type: string
        default: '880'
      ramfreq:
        description: '内存频率'
        required: true
        type: choice
        options:
        - '400'
        - '800'
        - '1066'
        - '1200'
        default: '1200'
      ddrparam:
        description: 'DDR 初始化参数'
        required: true
        type: choice
        options:
        - 'DDR2-64MiB'
        - 'DDR2-128MiB'
        - 'DDR2-W9751G6KB-64MiB-1066MHz'
        - 'DDR2-W971GG6KB25-128MiB-800MHz'
        - 'DDR2-W971GG6KB18-128MiB-1066MHz'
        - 'DDR3-128MiB'
        - 'DDR3-256MiB'
        - 'DDR3-512MiB'
        - 'DDR3-128MiB-KGD'
        default: 'DDR3-128MiB'
      oldparam:
        description: '使用旧版 DDR 参数'
        required: true
        type: boolean
        default: false
      baudrate:
        description: '串口波特率'
        required: true
        type: choice
        options:
        - '57600'
        - '115200'
        default: '115200'
      pub_release:
        description: '发布版本'
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: 编译 MT7621 U-Boot
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          path: uboot-mt7621

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y swig python2-dev python3-dev build-essential
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: 下载工具链
        run: |
          wget -O - https://github.com/DragonBluep/uboot-mt7621/releases/download/20230517/openwrt-toolchain-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz | tar -xJ

      - name: 解析参数
        id: gpio
        run: |
          IFS=',' read -r reset sysled <<< "${{ inputs.gpio_config }}"
          echo "reset=$reset" >> $GITHUB_OUTPUT
          echo "sysled=$sysled" >> $GITHUB_OUTPUT
          clean=$(echo "${{ inputs.model }}" | tr '/:*?"<>\\' '-')
          echo "clean=$clean" >> $GITHUB_OUTPUT

      - name: 清理旧文件
        working-directory: uboot-mt7621
        run: make distclean || true

      - name: 生成配置
        working-directory: uboot-mt7621
        run: |
          mkdir -p archive
          ./customize.sh \
            '${{ inputs.flash }}' '${{ inputs.mtdparts }}' '${{ inputs.kernel_offset }}' \
            '${{ steps.gpio.outputs.reset }}' '${{ steps.gpio.outputs.sysled }}' \
            '${{ inputs.cpufreq }}' '${{ inputs.ramfreq }}' '${{ inputs.ddrparam }}' \
            '${{ inputs.baudrate }}' '${{ inputs.model }}' '${{ inputs.model }}' '${{ inputs.oldparam }}'

      # 🔥 修复 md5 未定义引用
      - name: 强制开启 MD5
        working-directory: uboot-mt7621
        run: |
          echo "CONFIG_MD5=y" >> .config
          echo "CONFIG_SHA1=y" >> .config
          echo "CONFIG_HASH=y" >> .config

      # 🔥 彻底删除 -mno-abicalls（这次不留死角）
      - name: 彻底删除不兼容编译选项
        working-directory: uboot-mt7621
        run: |
          grep -rl "-mno-abicalls" . --include="Makefile*" --include="*.mk" --include="*.lds" --include=".config" | xargs sed -i 's/-mno-abicalls//g'
          grep -rl "-mabi=32" . --include="Makefile*" --include="*.mk" --include="*.lds" --include=".config" | xargs sed -i 's/-mabi=32//g'
          grep -rl "-EL" . --include="Makefile*" --include="*.mk" --include="*.lds" --include=".config" | xargs sed -i 's/-EL//g'
          grep -rl "-G" . --include="Makefile*" --include="*.mk" --include="*.lds" --include=".config" | xargs sed -i 's/-G [0-9]*//g'
          make olddefconfig

      # 正式编译
      - name: 正式编译
        working-directory: uboot-mt7621
        run: make -j$(nproc)

      - name: 复制固件
        working-directory: uboot-mt7621
        run: |
          cp u-boot-mt7621.bin archive/ 2>/dev/null || true
          cp u-boot.img archive/ 2>/dev/null || true

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.gpio.outputs.clean }}-uboot
          path: uboot-mt7621/archive/

      - name: 创建发布
        if: ${{ inputs.pub_release }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: U-Boot ${{ inputs.model }}
          tag_name: ${{ steps.gpio.outputs.clean }}-$(date +%Y%m%d-%H%M)
          files: uboot-mt7621/archive/*
