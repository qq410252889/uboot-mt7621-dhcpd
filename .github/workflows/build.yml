name: Build u-boot by board

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Device model, e.g. zte_e8820s'
        required: true
        type: string
        default: 'zte_e8820s'
      warninginfo:
        description: 'Warning: These configuration files from the automated migration.
          Configs-mt7621 <https://github.com/Yuzhii0718/uboot-mt7621-dhcpd/tree/main/configs-mt7621> are untrusted!
          Please definitely check whether they are suitable for your device before compiling!
          Please review the README <https://github.com/Yuzhii0718/uboot-mt7621-dhcpd/blob/main/README.md> before use!
          Otherwise, there is a risk of bricking your device, at your own risk!'
        required: true
        type: boolean
        default: false
      warning:
        description: 'I have read the README and warning messages and am proceeding at my own risk!'
        required: true
        type: boolean
        default: false
      confirm:
        description: 'I did not check the warning message; 
          I just blindly selected all the checkboxes.
          Please close this workflow!'
        required: true
        type: boolean
        default: false
      pub_release:
        description: 'Publish to GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build MT7621 u-boot
    runs-on: ubuntu-22.04
    strategy:
       fail-fast: False

    steps:
      - name: make sure the user has confirmed the warning
        if: ${{ !inputs.warning || !inputs.warninginfo }}
        run: |
          echo "Please confirm the warning before running this workflow."
          exit 1

      - name: make sure the user has confirmed the warning info not being trustworthy
        if: ${{ inputs.confirm }}
        run: |
          echo "Please confirm that you have read the warning info before running this workflow."
          exit 1

      - name: Checkout master directory
        uses: actions/checkout@v4
        with:
          path: uboot-mt7621

      - name: Install essential packages
        run: |
          sudo apt-get update
          sudo apt-get install swig python2-dev
          echo 'switch to python2 as default'
          sudo rm /usr/bin/python
          sudo ln -s /usr/bin/python2 /usr/bin/python

      - name: Download OpenWrt toolchain
        run: |
          wget -O - https://github.com/DragonBluep/uboot-mt7621/releases/download/20230517/openwrt-toolchain-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz \
            | tar --xz -xf -

      - name: Compile
        working-directory: uboot-mt7621
        run: |
          mkdir -p archive
          BOARD=${{ inputs.model }} ./build.sh | tee "archive/${{ inputs.model }}-build.log"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.model }}-uboot
          path: "uboot-mt7621/archive/"
      
      - name: Generate timestamp
        id: timestamp
        run: echo "now=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT

      - name: rename uboot-mt7621
        run: |
          for file in uboot-mt7621/archive/*; do
            filename=$(basename "$file")
            extension="${filename##*.}"
            name="${filename%.*}"
            mv "$file" "uboot-mt7621/archive/${name}-${{ steps.timestamp.outputs.now }}.${extension}"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: ${{ inputs.pub_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: BOARD-${{ inputs.model }}-${{ steps.timestamp.outputs.now }}
          body: |
            - Commit: ${{ github.sha }}
            - Build Time: ${{ steps.timestamp.outputs.now }} (UTC)
            - ---
            - Device: ${{ inputs.model }}
          files: uboot-mt7621/archive/*
          tag_name: ${{ inputs.model }}-${{ steps.timestamp.outputs.now }}
