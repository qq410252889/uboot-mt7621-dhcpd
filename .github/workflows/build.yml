name: Build u-boot by board

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Device model (select from list or input custom, match configs-mt7621/*.defconfig)'
        required: true
        type: string
        default: 'zte_e8820s'
        # 核心：添加型号下拉可选列表（示例值，实际会校验configs-mt7621目录）
        options:
          - zte_e8820s
          - mi_router_3g
          - newifi_d2
          - phicomm_k2p
          - hiwifi_hc5962
          - youhua_wr1200js
          - tplink_archer_c6u
          - asus_rt-ac57u
          - tenda_ac9
      warninginfo:
        description: 'Warning: These configuration files from the automated migration.
          Configs-mt7621 <https://github.com/Yuzhii0718/uboot-mt7621-dhcpd/tree/main/configs-mt7621> are untrusted!
          Please definitely check whether they are suitable for your device before compiling!
          Please review the README <https://github.com/Yuzhii0718/uboot-mt7621-dhcpd/blob/main/README.md> before use!
          Otherwise, there is a risk of bricking your device, at your own risk!'
        required: true
        type: boolean
        default: false
      warning:
        description: 'I have read the README and warning messages and am proceeding at my own risk!'
        required: true
        type: boolean
        default: false
      confirm:
        description: 'I did not check the warning message; 
          I just blindly selected all the checkboxes.
          Please close this workflow!'
        required: true
        type: boolean
        default: false
      pub_release:
        description: 'Publish to GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build MT7621 u-boot
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false

    steps:
      # 1. 合并安全校验逻辑（原两个校验步骤整合，更简洁）
      - name: Validate warning confirmations
        if: ${{ !inputs.warninginfo || !inputs.warning || inputs.confirm }}
        run: |
          echo "ERROR: You must confirm all warnings (warninginfo + warning) and DO NOT check the 'confirm' box!"
          exit 1

      # 2. 拉取代码（包含configs-mt7621目录）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: uboot-mt7621

      # 3. 核心：提取configs-mt7621下的型号 + 校验输入合法性
      - name: Extract & validate device model
        id: extract_models
        run: |
          # 进入配置文件目录，提取所有_defconfig前缀的型号
          cd uboot-mt7621/configs-mt7621
          AVAILABLE_MODELS=($(ls *.defconfig 2>/dev/null | sed 's/_defconfig$//g'))
          
          # 无配置文件时终止流程
          if [ ${#AVAILABLE_MODELS[@]} -eq 0 ]; then
            echo "ERROR: No defconfig files found in configs-mt7621 directory!"
            exit 1
          fi
          
          # 打印可用型号（调试用）
          echo "Available models: ${AVAILABLE_MODELS[*]}"
          echo "models=${AVAILABLE_MODELS[*]}" >> $GITHUB_OUTPUT

          # 校验用户输入的型号是否存在
          if [[ ! " ${AVAILABLE_MODELS[@]} " =~ " ${{ inputs.model }} " ]]; then
            echo "ERROR: Model '${{ inputs.model }}' is not supported! Available models: ${AVAILABLE_MODELS[*]}"
            exit 1
          fi

      # 4. 修复Ubuntu 22.04 Python2安装 + 补充编译依赖
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y swig build-essential libncurses-dev unzip bzip2 flex bison
          # Ubuntu 22.04无Python2官方源，手动编译安装
          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xf Python-2.7.18.tgz
          cd Python-2.7.18
          ./configure --enable-optimizations
          make -j$(nproc)
          sudo make altinstall
          sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python
          python --version

      # 5. 下载工具链（优化命令格式，避免管道符异常）
      - name: Download OpenWrt toolchain
        run: |
          wget -O openwrt-toolchain.tar.xz https://github.com/DragonBluep/uboot-mt7621/releases/download/20230517/openwrt-toolchain-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xJf openwrt-toolchain.tar.xz

      # 6. 提前生成时间戳（修复原重命名时机错误问题）
      - name: Generate build timestamp
        id: timestamp
        run: echo "now=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT

      # 7. 编译U-Boot（添加脚本权限，避免执行失败）
      - name: Compile U-Boot
        working-directory: uboot-mt7621
        run: |
          mkdir -p archive
          export BOARD=${{ inputs.model }}
          chmod +x build.sh
          ./build.sh | tee "archive/${{ inputs.model }}-build.log"

      # 8. 重命名编译产物（添加文件存在性判断，避免空文件报错）
      - name: Rename output files
        run: |
          cd uboot-mt7621/archive
          for file in *; do
            if [ -f "$file" ]; then
              filename="${file%.*}"
              extension="${file##*.}"
              mv "$file" "${filename}-${{ steps.timestamp.outputs.now }}.${extension}"
            fi
          done

      # 9. 上传产物（添加时间戳到名称，避免覆盖；无文件直接报错）
      - name: Upload compiled binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.model }}-uboot-${{ steps.timestamp.outputs.now }}
          path: uboot-mt7621/archive/
          if-no-files-found: error

      # 10. 发布Release（升级到v2版本，优化文案）
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: ${{ inputs.pub_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: "U-Boot for ${{ inputs.model }} (${{ steps.timestamp.outputs.now }})"
          tag_name: "${{ inputs.model }}-${{ steps.timestamp.outputs.now }}"
          body: |
            ## U-Boot Build for ${{ inputs.model }}
            - Build Time: ${{ steps.timestamp.outputs.now }} (UTC)
            - Commit: ${{ github.sha }}
            - Device Model: ${{ inputs.model }}
            - All Supported Models: ${{ steps.extract_models.outputs.models }}
            ---
            ⚠️ WARNING: Flash at your own risk!
          files: uboot-mt7621/archive/*
          draft: false
          prerelease: false
