name: Build u-boot by board

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Device model, e.g. zte_e8820s'
        required: true
        type: string
        default: 'zte_e8820s'
      warninginfo:
        description: 'Warning: These configuration files from the automated migration. Configs-mt7621 <https://github.com/Yuzhii0718/uboot-mt7621-dhcpd/tree/main/configs-mt7621> are untrusted! Please definitely check whether they are suitable for your device before compiling! Please review the README <https://github.com/Yuzhii0718/uboot-mt7621-dhcpd/blob/main/README.md> before use! Otherwise, there is a risk of bricking your device, at your own risk!'
        required: true
        type: boolean
        default: false
      warning:
        description: 'I have read the README and warning messages and am proceeding at my own risk!'
        required: true
        type: boolean
        default: false
      confirm:
        description: 'I did not check the warning message; I just blindly selected all the checkboxes. Please close this workflow!'
        required: true
        type: boolean
        default: false
      pub_release:
        description: 'Publish to GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build MT7621 u-boot
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false

    steps:
      - name: Validate warning confirmations
        if: ${{ !inputs.warninginfo || !inputs.warning || inputs.confirm }}
        run: |
          echo "ERROR: You must correctly confirm all warning messages to continue!"
          echo "1. Check warninginfo = true"
          echo "2. Check warning = true"
          echo "3. Keep confirm = false"
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: uboot-mt7621

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev python2-dev swig python-is-python2 bzip2 wget git make gcc g++

      - name: Download OpenWrt toolchain
        run: |
          wget -q -O - https://github.com/DragonBluep/uboot-mt7621/releases/download/20230517/openwrt-toolchain-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz \
            | tar -xJ

      - name: Generate build timestamp
        id: timestamp
        run: echo "now=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT

      - name: Compile U-Boot
        working-directory: uboot-mt7621
        run: |
          mkdir -p archive
          export TOOLCHAIN_DIR="../openwrt-toolchain-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64"
          export PATH=$TOOLCHAIN_DIR/bin:$PATH
          BOARD=${{ inputs.model }} ./build.sh | tee "archive/${{ inputs.model }}-build.log"

      - name: Rename files with timestamp
        run: |
          for file in uboot-mt7621/archive/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              name="${filename%.*}"
              ext="${filename#*.}"
              mv "$file" "uboot-mt7621/archive/${name}-${{ steps.timestamp.outputs.now }}.$ext"
            fi
          done

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.model }}-uboot-${{ steps.timestamp.outputs.now }}
          path: uboot-mt7621/archive/
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: ${{ inputs.pub_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: "U-Boot for ${{ inputs.model }} (${{ steps.timestamp.outputs.now }})"
          tag_name: ${{ inputs.model }}-${{ steps.timestamp.outputs.now }}
          body: |
            - Device Model: ${{ inputs.model }}
            - Build Time: ${{ steps.timestamp.outputs.now }} (UTC)
            - Commit SHA: ${{ github.sha }}
          files: uboot-mt7621/archive/*
          draft: false
          prerelease: false
