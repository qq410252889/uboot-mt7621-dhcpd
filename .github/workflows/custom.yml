name: Build customized u-boot
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Device Model'
        required: true
        type: string
        default: 'Xiaomi_Mi_Router_4a/3g-v2'
      flash:
        description: 'Flash Type'
        required: true
        type: choice
        options:
        - 'NAND'
        - 'NAND-NMBM'
        - 'NOR'
        default: 'NOR'
      mtdparts:
        description: 'MTD Partitions'
        required: true
        type: string
        default: '192k(u-boot),64k(u-boot-env),64k(factory),64k(factory),64k(crash),64k(cfg_bak),1m(overlay),-(firmware)'
      kernel_offset:
        description: 'Kernel Load Address'
        required: true
        type: string
        default: '0x180000'
      gpio_config:
        description: 'GPIO Config (format: reset_pin,sysled_pin)'
        required: true
        type: string
        default: '18,18'
      cpufreq:
        description: 'CPU Frequency (400 - 1200)'
        required: true
        type: string
        default: '880'
      ramfreq:
        description: 'DRAM Frequency'
        required: true
        type: choice
        options:
        - '400'
        - '800'
        - '1066'
        - '1200'
        default: '1200'
      ddrparam:
        description: 'DDR initialization parameters'
        required: true
        type: choice
        options:
        - 'DDR2-64MiB'
        - 'DDR2-128MiB'
        - 'DDR2-W9751G6KB-64MiB-1066MHz'
        - 'DDR2-W971GG6KB25-128MiB-800MHz'
        - 'DDR2-W971GG6KB18-128MiB-1066MHz'
        - 'DDR3-128MiB'
        - 'DDR3-256MiB'
        - 'DDR3-512MiB'
        - 'DDR3-128MiB-KGD'
        default: 'DDR3-128MiB'
      oldparam:
        description: 'Use old DDR parameters (for compatibility with older hardware revisions)'
        required: true
        type: boolean
        default: false
      baudrate:
        description: 'Baud Rate'
        required: true
        type: choice
        options:
        - '57600'
        - '115200'
        default: '115200'
      pub_release:
        description: 'Publish to GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build MT7621 u-boot
    runs-on: ubuntu-22.04
    strategy:
       fail-fast: False

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: uboot-mt7621

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y swig python2-dev python3-dev build-essential
          sudo rm -f /usr/bin/python
          sudo ln -s /usr/bin/python2 /usr/bin/python

      - name: Download toolchain
        run: |
          wget -O - https://github.com/DragonBluep/uboot-mt7621/releases/download/20230517/openwrt-toolchain-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz \
            | tar --xz -xf -

      - name: Parse GPIO
        id: gpio
        run: |
          IFS=',' read -r reset_pin sysled_pin <<< "${{ inputs.gpio_config }}"
          echo "reset_pin=$reset_pin" >> $GITHUB_OUTPUT
          echo "sysled_pin=$sysled_pin" >> $GITHUB_OUTPUT

      - name: Clean model name
        id: clean_model
        run: |
          clean_model=$(echo "${{ inputs.model }}" | tr '/:*?<>|"\\' '-------')
          echo "clean_model=$clean_model" >> $GITHUB_OUTPUT

      - name: Pre-clean
        working-directory: uboot-mt7621
        run: |
          rm -f .config mt7621_build_defconfig
          rm -rf arch/mips/include/configs auto.conf include/config

      - name: Compile
        working-directory: uboot-mt7621
        run: |
          mkdir -p archive
          ./customize.sh \
            '${{ inputs.flash }}' \
            '${{ inputs.mtdparts }}' \
            '${{ inputs.kernel_offset }}' \
            '${{ steps.gpio.outputs.reset_pin }}' \
            '${{ steps.gpio.outputs.sysled_pin }}' \
            '${{ inputs.cpufreq }}' \
            '${{ inputs.ramfreq }}' \
            '${{ inputs.ddrparam }}' \
            '${{ inputs.baudrate }}' \
            '${{ inputs.model }}' \
            '${{ inputs.model }}' \
            '${{ inputs.oldparam }}' \
            | tee "archive/${{ steps.clean_model.outputs.clean_model }}-build.log" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.clean_model.outputs.clean_model }}-uboot
          path: "uboot-mt7621/archive/"
          if-no-files-found: warn

      - name: Generate timestamp
        id: timestamp
        run: echo "now=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT

      - name: Rename files
        run: |
          shopt -s nullglob
          for file in uboot-mt7621/archive/*; do
            filename=$(basename "$file")
            ext="${filename##*.}"
            name="${filename%.*}"
            mv "$file" "uboot-mt7621/archive/${name}-${{ steps.timestamp.outputs.now }}.${ext}"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: ${{ inputs.pub_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: CUSTOM-${{ steps.clean_model.outputs.clean_model }}-${{ steps.timestamp.outputs.now }}
          body: |
            - Commit: ${{ github.sha }}
            - Build Time: ${{ steps.timestamp.outputs.now }} (UTC)
            - ---
            - Device: ${{ inputs.model }}
            - Flash: ${{ inputs.flash }}
            - MTD: ${{ inputs.mtdparts }}
            - Kernel Offset: ${{ inputs.kernel_offset }}
            - Reset GPIO: ${{ steps.gpio.outputs.reset_pin }}
            - SysLED GPIO: ${{ steps.gpio.outputs.sysled_pin }}
            - CPU: ${{ inputs.cpufreq }} MHz
            - DDR Clock: ${{ inputs.ramfreq }} MHz
            - DDR Type: ${{ inputs.ddrparam }}
            - Old DDR Param: ${{ inputs.oldparam }}
            - Baudrate: ${{ inputs.baudrate }}
          files: uboot-mt7621/archive/*
          tag_name: ${{ steps.clean_model.outputs.clean_model }}-${{ steps.timestamp.outputs.now }}
