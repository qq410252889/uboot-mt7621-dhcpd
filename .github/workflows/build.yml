name: 按设备编译 U-Boot

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 消除 Node.js 版本警告

on:
  workflow_dispatch:
    inputs:
      model:
        description: '设备型号，例如：xiaomi_mi-router-3-pro'
        required: true
        type: string
        default: 'xiaomi_mi-router-3-pro'
      warninginfo:
        description: '警告：此配置文件为自动迁移生成。mt7621 系列配置文件不受信任！编译前务必确认适配你的设备！使用前请阅读项目 README！错误刷写有变砖风险，风险自负！'
        required: true
        type: boolean
        default: false
      warning:
        description: '我已阅读警告与说明，知晓刷机风险并自愿承担全部后果！'
        required: true
        type: boolean
        default: false
      confirm:
        description: '我未阅读任何警告，只是盲目勾选选项（请勿勾选此项）'
        required: true
        type: boolean
        default: false
      pub_release:
        description: '编译完成后发布到 GitHub 版本发布'
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: 编译 MT7621 U-Boot
    runs-on: ubuntu-22.04
    steps:
      - name: 校验风险确认选项
        if: ${{ !inputs.warninginfo || !inputs.warning || inputs.confirm }}
        run: |
          echo "错误：必须正确勾选全部风险确认项才可继续！"
          echo "1. 勾选【风险声明】"
          echo "2. 勾选【已知风险】"
          echo "3. 取消【未读警告盲目勾选】"
          exit 1

      - name: 拉取仓库代码
        uses: actions/checkout@v4.1.7
        with:
          path: uboot-mt7621

      - name: 安装编译依赖环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev python2-dev swig bzip2 wget git make gcc g++ libssl-dev u-boot-tools
          # 手动设置 python -> python2
          sudo rm -f /usr/bin/python
          sudo ln -s /usr/bin/python2 /usr/bin/python
          python --version  # 验证版本

      - name: 下载 OpenWrt 交叉编译工具链
        run: |
          wget -q -O - https://github.com/DragonBluep/uboot-mt7621/releases/download/20230517/openwrt-toolchain-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz \
            | tar -xJ

      - name: 调试：查看配置文件目录
        working-directory: uboot-mt7621
        run: |
          echo "=== 查看 configs-mt7621 目录 ==="
          ls -la configs-mt7621/ || echo "configs-mt7621 目录不存在"
          echo "=== 查看 configs 目录 ==="
          ls -la configs/ || echo "configs 目录不存在"
          echo "=== 搜索目标配置文件 ==="
          find . -name "*xiaomi_mi-router-3-pro*" || echo "未找到匹配的配置文件"

      - name: 生成时间戳
        id: timestamp
        run: echo "now=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT

      - name: 编译 U-Boot
        working-directory: uboot-mt7621
        run: |
          mkdir -p archive
          export TOOLCHAIN_DIR="../openwrt-toolchain-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64"
          export PATH=$TOOLCHAIN_DIR/bin:$PATH
          BOARD=${{ inputs.model }} ./build.sh 2>&1 | tee "archive/${{ inputs.model }}-编译日志.log"

      - name: 给产物文件添加时间戳重命名
        run: |
          for file in uboot-mt7621/archive/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              name="${filename%.*}"
              ext="${filename#*.}"
              mv "$file" "uboot-mt7621/archive/${name}-${{ steps.timestamp.outputs.now }}.${ext}"
            fi
          done

      - name: 上传编译成品文件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.model }}-uboot-${{ steps.timestamp.outputs.now }}
          path: uboot-mt7621/archive/
          if-no-files-found: error

      - name: 创建 GitHub 发布版本
        uses: softprops/action-gh-release@v2
        if: ${{ inputs.pub_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: "设备 ${{ inputs.model }} U-Boot 固件（${{ steps.timestamp.outputs.now }}）"
          tag_name: ${{ inputs.model }}-${{ steps.timestamp.outputs.now }}
          body: |
            - 设备型号：${{ inputs.model }}
            - 编译时间：${{ steps.timestamp.outputs.now }}（UTC 世界协调时间）
            - 提交哈希：${{ github.sha }}
          files: uboot-mt7621/archive/*
          draft: false
          prerelease: false
